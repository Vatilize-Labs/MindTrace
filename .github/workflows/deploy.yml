name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  vercel:
    name: Deploy frontend to Vercel
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Check deploy secrets
        id: check
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::VERCEL_TOKEN secret is not set - skipping deploy. Add VERCEL_TOKEN, VERCEL_ORG_ID and VERCEL_PROJECT_ID repo secrets to enable, or rely on Vercel's Git integration."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.configured == 'true'

      - name: Install Vercel CLI
        if: steps.check.outputs.configured == 'true'
        run: npm install -g vercel

      - name: Pull Vercel environment
        if: steps.check.outputs.configured == 'true'
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build
        if: steps.check.outputs.configured == 'true'
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy
        if: steps.check.outputs.configured == 'true'
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
