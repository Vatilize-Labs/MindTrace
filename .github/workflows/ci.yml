name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (lint, type-check, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Build
        run: pnpm build

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist
          retention-days: 7

  contract:
    name: Soroban contract (test, build wasm)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: soroban
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: soroban

      - name: Test
        run: cargo test

      - name: Build wasm
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Upload contract wasm
        uses: actions/upload-artifact@v4
        with:
          name: mindtrace-soroban-wasm
          path: soroban/target/wasm32-unknown-unknown/release/mindtrace_soroban.wasm
          retention-days: 7
